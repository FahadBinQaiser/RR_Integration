name: CI

on:
  pull_request:
  push: 
    branches: [main]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: Backend/.ruby-version   
          bundler-cache: true
          working-directory: Backend
      - name: Scan for Security Vulnerabilities
        run: cd Backend && bin/brakeman --no-pager   
  lint:
    runs-on: ubuntu-latest
    steps: 
     - name: Checkout code
       uses: actions/checkout@v6 
     - name: Set up Ruby
       uses: ruby/setup-ruby@v1
       with: 
        ruby-version-file: Backend/.ruby-version
        bundler-cache: true
        working-directory: Backend
     - name: Lint code
       run: cd Backend && bin/rubocop -f github   
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fahad
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rr_integration_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: Backend/.ruby-version
          bundler-cache: true
          working-directory: Backend
      - name: Run tests
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_USER: fahad
          DB_PASSWORD: password
        run: cd Backend && bin/rails db:test:prepare test